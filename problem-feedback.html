<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问题反馈 - 重庆大学新生服务融合中心平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
<style>
/* CSS 变量已移入 shared.css */
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--font-family);font-weight:var(--font-weight-normal);background-color:var(--background-color);color:var(--text-primary);line-height:1.5;overflow-x:hidden;min-height:100vh}section{position:relative;z-index:1;transition:transform .8s cubic-bezier(.175,.885,.32,1.275);padding:var(--spacing-xxl) 0;min-height:var(--section-min-height);display:flex;align-items:center}section::before{content:'';position:absolute;top:-50px;left:0;width:100%;height:100px;background:linear-gradient(to bottom,rgba(245,245,247,0) 0%,rgba(245,245,247,1) 100%);z-index:-1}header{position:fixed;top:20px;left:50%;transform:translateX(-50%);width:90%;height:var(--header-height);background:rgba(255,255,255,.25);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--border-radius-xl);box-shadow:var(--shadow-md);z-index:1000;transition:all var(--transition-normal) ease;border:1px solid rgba(255,255,255,.3)}header.scrolled{background:rgba(255,255,255,.35);box-shadow:var(--shadow-lg)}.nav-container{display:flex;justify-content:space-between;align-items:center;height:100%;padding:0 var(--spacing-md)}.logo{display:flex;align-items:center;gap:var(--spacing-sm);text-decoration:none}.logo-icon{font-family:var(--font-family);font-size:1.8rem;font-weight:var(--font-weight-bold);letter-spacing:4px;background:linear-gradient(135deg,#c62828 0%,#ff7043 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:0 1px 0 rgba(255,255,255,.5),0 2px 4px rgba(0,0,0,.2),0 4px 8px rgba(0,0,0,.1)}.logo-text{display:flex;flex-direction:column;line-height:1.2}.logo-main{font-size:1.1rem;font-weight:var(--font-weight-semibold);color:var(--text-primary)}.logo-sub{font-size:.7rem;color:var(--text-secondary)}.nav-center{display:flex;align-items:center;flex-direction:column;position:relative}.school-badge{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all var(--transition-normal) ease;cursor:pointer}.school-logo{width:100%;height:100%;object-fit:cover;border-radius:50%}.nav-links{display:flex;list-style:none;gap:var(--spacing-sm);position:relative}.nav-link{text-decoration:none;color:var(--text-secondary);font-weight:var(--font-weight-medium);font-size:.9rem;transition:all .4s cubic-bezier(.175,.885,.32,1.275);position:relative;padding:var(--spacing-sm) var(--spacing-md);background:rgba(255,255,255,.6);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.4);border-radius:var(--border-radius-lg);box-shadow:0 4px 12px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.15);cursor:pointer;overflow:hidden;transform:translateZ(0);display:block}.nav-link:hover{color:var(--cqu-blue);transform:translateY(-2px) scale(1.05);background:rgba(255,255,255,.7);box-shadow:0 8px 20px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2)}.nav-link:active{transform:translateY(0) scale(.98);transition:all .1s ease}.nav-link::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:var(--border-radius-lg);background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,rgba(255,255,255,.05) 30%,rgba(255,255,255,.1) 70%,rgba(255,255,255,.05) 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}.nav-link:hover::before{opacity:1}.nav-link::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .6s ease}.nav-link:hover::after{left:100%}.dropdown{position:relative}.dropdown:hover .nav-link{color:var(--cqu-blue);transform:translateY(-2px) scale(1.05);background:rgba(255,255,255,.7);box-shadow:0 8px 20px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2)}.dropdown-content{position:absolute;top:100%;left:0;width:135px;background:rgba(255,255,255,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--border-radius-lg);box-shadow:var(--shadow-lg);padding:var(--spacing-sm) 0;opacity:0;visibility:hidden;transform:translateY(-10px);transition:all .5s cubic-bezier(.175,.885,.32,1.275);z-index:1001;border:1px solid rgba(255,255,255,.4);margin-top:8px}.dropdown:hover .dropdown-content{opacity:1;visibility:visible;transform:translateY(0)}.dropdown-item{display:block;padding:var(--spacing-sm) var(--spacing-md);text-decoration:none;color:var(--text-secondary);transition:all var(--transition-fast) ease}.dropdown-item:hover{background:rgba(255,255,255,.5);color:var(--cqu-blue);transform:translateX(5px)}.feedback-hero{min-height:60vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#f5f7fa 0%,#e3e7ed 100%)}.feedback-content{text-align:center;z-index:10;max-width:800px;padding:var(--spacing-xxl) var(--spacing-md)}.feedback-title{font-size:clamp(2.5rem,5vw,4rem);font-weight:var(--font-weight-bold);margin-bottom:var(--spacing-md);line-height:1.1;opacity:0;transform:translateY(30px);animation:fadeInUp 1s var(--transition-slow) forwards}.feedback-subtitle{font-size:clamp(1.1rem,2vw,1.3rem);font-weight:var(--font-weight-normal);color:var(--text-secondary);margin-bottom:var(--spacing-xl);opacity:0;transform:translateY(30px);animation:fadeInUp 1s var(--transition-slower) forwards}.feedback-section{padding:var(--spacing-xxl) 0;min-height:var(--section-min-height);display:flex;align-items:center}.feedback-form-container{max-width:1000px;margin:0 auto;width:100%}.feedback-form{background:rgba(255,255,255,.9);border-radius:var(--border-radius-xl);padding:var(--spacing-xxl);box-shadow:var(--shadow-lg);transition:all var(--transition-normal) ease;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.4);position:relative;overflow:hidden}.feedback-form::before{content:'';position:absolute;top:0;left:0;width:100%;height:6px;background:linear-gradient(90deg,var(--cqu-blue),var(--cqu-orange))}.form-group{margin-bottom:var(--spacing-xl)}.form-label{display:block;margin-bottom:var(--spacing-sm);font-weight:var(--font-weight-semibold);color:var(--text-primary);font-size:1.1rem}.form-input,.form-select,.form-textarea{width:100%;padding:var(--spacing-md);border-radius:var(--border-radius-lg);border:1px solid var(--border-color);background:rgba(255,255,255,.9);font-family:var(--font-family);transition:all var(--transition-normal) ease;font-size:1.1rem;box-shadow:var(--shadow-sm)}.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--cqu-blue);box-shadow:0 0 0 3px rgba(30,79,161,.2);background:rgba(255,255,255,1);transform:translateY(-2px)}.form-textarea{min-height:200px;resize:vertical}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-lg)}.submit-btn{display:inline-block;padding:var(--spacing-md) var(--spacing-xl);background:linear-gradient(135deg,var(--cqu-blue) 0%,var(--cqu-light-blue) 100%);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.4);border-radius:var(--border-radius-lg);box-shadow:0 4px 12px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.15);color:white;text-decoration:none;font-weight:var(--font-weight-semibold);font-size:1.2rem;transition:all .4s cubic-bezier(.175,.885,.32,1.275);position:relative;overflow:hidden;transform:translateZ(0);cursor:pointer;border:none;width:100%;margin-top:var(--spacing-md)}.submit-btn:hover{background:linear-gradient(135deg,var(--cqu-dark-blue) 0%,var(--cqu-blue) 100%);transform:translateY(-4px) scale(1.02);box-shadow:0 8px 20px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2)}.submit-btn:active{transform:translateY(0) scale(.98);transition:all .1s ease}.submit-btn::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:var(--border-radius-lg);background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,rgba(255,255,255,.05) 30%,rgba(255,255,255,.1) 70%,rgba(255,255,255,.05) 100%);opacity:0;transition:opacity .3s ease;pointer-events:none}.submit-btn:hover::before{opacity:1}.submit-btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .6s ease}.submit-btn:hover::after{left:100%}@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@media (max-width:768px){.nav-links{display:none}.feedback-title{font-size:2.5rem}.feedback-subtitle{font-size:1.1rem}header{width:95%;top:10px}.dropdown-content{width:135px}.feedback-form{padding:var(--spacing-xl)}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
    <!-- Header 由 shared.js 自动注入 -->

<section class="feedback-hero" id="home">
<div class="feedback-content">
<h1 class="feedback-title">问题反馈</h1>
<p class="feedback-subtitle">请详细描述您遇到的问题，我们将尽快为您解决</p>
</div>
</section>

<section class="feedback-section" id="feedback">
<div class="container">
<div class="feedback-form-container">
<form class="feedback-form" id="feedbackForm">
<div class="form-row">
<div class="form-group">
<label for="name" class="form-label">姓名</label>
<input type="text" id="name" class="form-input" placeholder="请输入您的姓名" required>
</div>
<div class="form-group">
<label for="studentId" class="form-label">学号</label>
<input type="text" id="studentId" class="form-input" placeholder="请输入您的学号" required>
</div>
</div>
<div class="form-row">
<div class="form-group">
<label for="contact" class="form-label">联系方式</label>
<input type="text" id="contact" class="form-input" placeholder="请输入您的手机号或邮箱" required>
</div>
<div class="form-group">
<label for="problemType" class="form-label">问题类型</label>
<select id="problemType" class="form-select" required>
<option value="" disabled selected>请选择问题类型</option>
<option value="technical">技术问题</option>
<option value="content">内容错误</option>
<option value="suggestion">功能建议</option>
<option value="other">其他问题</option>
</select>
</div>
</div>
<div class="form-group">
<label for="problemDescription" class="form-label">问题描述</label>
<textarea id="problemDescription" class="form-textarea" placeholder="请详细描述您遇到的问题..." required></textarea>
</div>
<div class="form-group">
<label for="screenshot" class="form-label">上传截图（可选）</label>
<input type="file" id="screenshot" class="form-input" accept="image/*">
</div>
<button type="submit" class="submit-btn">提交反馈</button>
</form>
</div>
</div>
</section>

    <script src="assets/js/shared.js"></script>
<script>
let isScrolling=!1,scrollTimer;window.addEventListener('scroll',()=>{const header=document.getElementById('header');window.scrollY>50?header.classList.add('scrolled'):header.classList.remove('scrolled');isScrolling||(document.querySelectorAll('section').forEach(section=>section.style.transform='scale(0.98)'),isScrolling=!0);clearTimeout(scrollTimer);scrollTimer=setTimeout(()=>{document.querySelectorAll('section').forEach(section=>section.style.transform='scale(1)');isScrolling=!1},100)});const feedbackForm=document.getElementById('feedbackForm');feedbackForm.addEventListener('submit',function(e){e.preventDefault();const formData={name:document.getElementById('name').value,studentId:document.getElementById('studentId').value,contact:document.getElementById('contact').value,problemType:document.getElementById('problemType').value,problemDescription:document.getElementById('problemDescription').value,screenshot:document.getElementById('screenshot').files[0]?document.getElementById('screenshot').files[0].name:'无'};console.log('表单数据:',formData);alert('感谢您的反馈！我们已收到您的问题，将尽快处理。');feedbackForm.reset()});window.dispatchEvent(new Event('scroll'));
</script>
</body>
</html>

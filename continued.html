<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>功能开发中 - 重庆大学新生服务融合中心平台</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/shared.css">
<style>
/* CSS 变量已移入 shared.css */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-family);background-color:var(--background-color);color:var(--text-primary);line-height:1.6;min-height:100vh}

header{position:fixed;top:20px;left:50%;transform:translateX(-50%);width:90%;height:var(--header-height);background:rgba(255,255,255,.25);backdrop-filter:blur(20px);border-radius:var(--border-radius-xl);box-shadow:var(--shadow-md);z-index:1000;transition:var(--transition-normal);border:1px solid rgba(255,255,255,.3)}
header.scrolled{background:rgba(255,255,255,.35);box-shadow:var(--shadow-lg)}
.nav-container{display:flex;justify-content:space-between;align-items:center;height:100%;padding:0 var(--spacing-md)}
.logo{display:flex;align-items:center;gap:var(--spacing-sm);text-decoration:none}
.logo-icon{font-family:var(--font-family);font-size:1.8rem;font-weight:var(--font-weight-bold);letter-spacing:4px;background:linear-gradient(135deg,#c62828 0%,#ff7043 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text{display:flex;flex-direction:column;line-height:1.2}
.logo-main{font-size:1.1rem;font-weight:var(--font-weight-semibold);color:var(--text-primary)}
.logo-sub{font-size:.7rem;color:var(--text-secondary)}
.nav-links{display:flex;list-style:none;gap:var(--spacing-sm)}
.nav-link{text-decoration:none;color:var(--text-secondary);font-weight:var(--font-weight-medium);font-size:.9rem;transition:var(--transition-normal);padding:var(--spacing-sm) var(--spacing-md);background:rgba(255,255,255,.6);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.4);border-radius:var(--border-radius-lg);box-shadow:0 4px 12px rgba(0,0,0,.1);cursor:pointer}
.nav-link:hover{color:var(--cqu-blue);transform:translateY(-2px) scale(1.05);background:rgba(255,255,255,.7)}
.content-section{padding:calc(var(--spacing-xxxl) + var(--header-height)) 0 var(--spacing-xxxl);display:flex;align-items:center;justify-content:center;position:relative;min-height:100vh}
.central-container{position:relative;width:100%;display:flex;justify-content:center;align-items:center;flex-direction:column}
.liquid-circle{position:absolute;width:600px;height:600px;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.25) 0%,rgba(255,255,255,.15) 100%);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,.6);box-shadow:0 20px 40px rgba(0,0,0,.15),inset 0 2px 0 rgba(255,255,255,.5);transition:var(--transition-normal);overflow:hidden;cursor:pointer;z-index:1}
.liquid-circle::before{content:'';position:absolute;top:-20%;left:-20%;right:-20%;bottom:-20%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.3) 0%,rgba(255,255,255,.1) 40%,transparent 70%);border-radius:50%;filter:blur(15px);opacity:.8;transition:var(--transition-normal);pointer-events:none}
.liquid-circle::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,rgba(255,255,255,.08) 30%,rgba(255,255,255,.15) 70%,rgba(255,255,255,.08) 100%);opacity:0;transition:var(--transition-normal);pointer-events:none}
.liquid-circle:hover::after{opacity:1}
.liquid-circle:hover{transform:scale(1.05);box-shadow:0 25px 50px rgba(0,0,0,.2),inset 0 2px 0 rgba(255,255,255,.6)}
.center-content{position:relative;z-index:2;text-align:center;max-width:500px;padding:var(--spacing-xl);background:rgba(255,255,255,.5);backdrop-filter:blur(20px);border-radius:var(--border-radius-xl);border:1px solid rgba(255,255,255,.4);box-shadow:var(--shadow-md);margin-bottom:var(--spacing-xxxl)}
.main-icon{font-size:5rem;color:var(--cqu-blue);margin-bottom:var(--spacing-lg);display:block;transition:all .5s ease;filter:drop-shadow(0 4px 8px rgba(0,0,0,.2))}
.main-title{font-size:3rem;font-weight:var(--font-weight-bold);color:var(--cqu-blue);margin-bottom:var(--spacing-md);background:linear-gradient(135deg,var(--cqu-blue) 0%,var(--cqu-orange) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.main-description{font-size:1.3rem;color:var(--text-secondary);margin-bottom:var(--spacing-xl);line-height:1.6}
.progress-container{width:100%;height:12px;background:rgba(255,255,255,.3);border-radius:6px;overflow:hidden;margin-bottom:var(--spacing-md);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2)}
.progress-bar{height:100%;width:65%;background:linear-gradient(90deg,var(--cqu-blue),var(--cqu-orange));border-radius:6px;transition:width 1s ease;position:relative;overflow:hidden}
.progress-bar::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 2s infinite}
@keyframes shimmer{0%{left:-100%}100%{left:100%}}
.progress-text{font-size:1.1rem;color:var(--text-secondary);margin-bottom:var(--spacing-xl)}
.action-buttons{display:flex;justify-content:center}
.action-btn{padding:var(--spacing-md) var(--spacing-xl);background:rgba(30,79,161,.7);backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.4);border-radius:var(--border-radius-lg);color:#fff;text-decoration:none;font-weight:var(--font-weight-medium);font-size:1.1rem;transition:all .4s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 4px 12px rgba(0,0,0,.1);display:flex;align-items:center;gap:var(--spacing-sm);min-width:160px;justify-content:center}
.action-btn:hover{transform:translateY(-5px);background:rgba(30,79,161,.9);box-shadow:0 10px 25px rgba(0,0,0,.15)}
.bubbles-background{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:var(--font-weight-bold);transition:all .3s ease;background:linear-gradient(135deg,rgba(255,255,255,.7) 0%,rgba(255,255,255,.4) 100%);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);box-shadow:0 8px 20px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.5);overflow:hidden;cursor:default}
.bubble::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.4) 0%,rgba(255,255,255,.1) 40%,transparent 70%);pointer-events:none}
.bubble-number{position:relative;z-index:2;text-shadow:1px 1px 2px rgba(0,0,0,.3),0 0 10px rgba(255,255,255,.5);color:var(--cqu-blue);font-weight:var(--font-weight-bold)}
.normal-bubble{animation:gentle-float 8s infinite ease-in-out;pointer-events:none}
@keyframes gentle-float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(5deg)}}
#specialBubblesContainer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2000;pointer-events:none}
.special-bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:var(--font-weight-bold);transition:all .3s ease;background:linear-gradient(135deg,rgba(30,79,161,.7) 0%,rgba(42,101,199,.5) 100%);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);box-shadow:0 10px 25px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.5);overflow:hidden;pointer-events:auto;cursor:pointer;z-index:2001;animation:special-float 6s infinite ease-in-out}
.special-bubble::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.4) 0%,rgba(255,255,255,.1) 40%,transparent 70%);pointer-events:none}
.special-bubble .bubble-number{color:#fff;text-shadow:1px 1px 3px rgba(0,0,0,.5),-1px -1px 2px rgba(255,255,255,.3),0 0 10px rgba(255,255,255,.6)}
@keyframes special-float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.05)}}
.special-bubble:hover{animation:bounce .5s ease;background:linear-gradient(135deg,rgba(245,124,0,.8) 0%,rgba(255,112,67,.6) 100%);box-shadow:0 12px 30px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.7);transform:scale(1.1)}
@keyframes bounce{0%,100%{transform:scale(1)}30%{transform:scale(1.2)}50%{transform:scale(.9)}70%{transform:scale(1.1)}}
.correct-sequence{background:linear-gradient(135deg,rgba(76,175,80,.8) 0%,rgba(102,187,106,.6) 100%)!important;box-shadow:0 12px 25px rgba(76,175,80,.4),inset 0 1px 0 rgba(255,255,255,.7)!important}
.wrong-sequence{background:linear-gradient(135deg,rgba(244,67,54,.8) 0%,rgba(239,83,80,.6) 100%)!important;box-shadow:0 12px 25px rgba(244,67,54,.4),inset 0 1px 0 rgba(255,255,255,.7)!important}
.upcoming-features{margin-top:var(--spacing-xxxl);text-align:center;position:relative;z-index:2}
.section-title{font-size:2.5rem;font-weight:var(--font-weight-semibold);margin-bottom:var(--spacing-lg);color:var(--cqu-blue);text-align:center}
.features-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--spacing-lg);margin-top:var(--spacing-xl)}
.feature-item{background:rgba(255,255,255,.6);backdrop-filter:blur(15px);border-radius:var(--border-radius-lg);padding:var(--spacing-lg);border:1px solid rgba(255,255,255,.4);box-shadow:var(--shadow-sm);transition:all .3s ease}
.feature-item:hover{transform:translateY(-5px);box-shadow:var(--shadow-md);background:rgba(255,255,255,.8)}
.feature-icon-small{font-size:2.5rem;color:var(--cqu-blue);margin-bottom:var(--spacing-sm)}
.feature-title{font-size:1.2rem;font-weight:var(--font-weight-semibold);color:var(--cqu-blue);margin-bottom:var(--spacing-xs)}
.feature-desc{color:var(--text-secondary);font-size:.9rem}

/* 移动端菜单 */
.mobile-menu-toggle { display: none; flex-direction: column; justify-content: space-between; width: 24px; height: 18px; cursor: pointer; z-index: 1001; }
.mobile-menu-toggle span { display: block; height: 2px; width: 100%; background-color: var(--text-primary); border-radius: 2px; transition: all var(--transition-normal) ease; }
.mobile-menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
.mobile-menu-toggle.active span:nth-child(2) { opacity: 0; }
.mobile-menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

/* 移动端优化 */
@media (max-width: 768px) {
    /* 导航栏优化 */
    header { width: 95%; top: 10px; height: 60px; }
    .nav-container { padding: 0 var(--spacing-sm); }
    .logo { gap: var(--spacing-xs); }
    .logo-icon { font-size: 1.5rem; letter-spacing: 2px; }
    .logo-text { line-height: 1.1; }
    .logo-main { font-size: 0.9rem; }
    .logo-sub { font-size: 0.6rem; }
    
    /* 移动端菜单 */
    .mobile-menu-toggle { display: flex; }
    .nav-links { 
        display: none; 
        position: fixed; 
        top: 70px; 
        left: 0; 
        width: 100%; 
        background: rgba(255,255,255,0.95); 
        backdrop-filter: blur(20px); 
        flex-direction: column; 
        padding: var(--spacing-md); 
        box-shadow: var(--shadow-lg); 
        border-radius: 0 0 var(--border-radius-xl) var(--border-radius-xl); 
        z-index: 999; 
    }
    .nav-links.active { display: flex; }
    .nav-link { width: 100%; text-align: center; padding: var(--spacing-md); margin-bottom: var(--spacing-xs); font-size: 1rem; }
    
    /* 内容区域优化 */
    .content-section { 
        padding: calc(var(--spacing-xl) + 60px) 0 var(--spacing-xl); 
        min-height: auto; 
    }
    
    /* 液体圆形优化 */
    .liquid-circle { 
        height: 300px; 
        width: 300px; 
    }
    
    /* 中心内容优化 */
    .center-content { 
        max-width: 90%; 
        padding: var(--spacing-lg); 
        margin-bottom: var(--spacing-xl);
    }
    .main-icon { 
        font-size: 3.5rem; 
        margin-bottom: var(--spacing-md); 
    }
    .main-title { 
        font-size: 2rem; 
        margin-bottom: var(--spacing-sm); 
    }
    .main-description { 
        font-size: 1rem; 
        margin-bottom: var(--spacing-lg); 
        line-height: 1.5;
    }
    .progress-text { 
        font-size: 1rem; 
        margin-bottom: var(--spacing-lg); 
    }
    
    /* 按钮优化 */
    .action-buttons { 
        flex-direction: column; 
        align-items: center; 
        gap: var(--spacing-sm);
    }
    .action-btn { 
        font-size: 1rem; 
        padding: var(--spacing-sm) var(--spacing-lg);
        width: 100%;
        max-width: 200px;
    }
    
    /* 即将上线功能优化 */
    .upcoming-features { 
        margin-top: var(--spacing-xl); 
    }
    .section-title { 
        font-size: 1.8rem; 
        margin-bottom: var(--spacing-md); 
    }
    .features-grid { 
        grid-template-columns: 1fr; 
        gap: var(--spacing-md); 
        margin-top: var(--spacing-lg); 
    }
    .feature-item { 
        padding: var(--spacing-md); 
    }
    .feature-icon-small { 
        font-size: 2rem; 
        margin-bottom: var(--spacing-xs); 
    }
    .feature-title { 
        font-size: 1.1rem; 
    }
    .feature-desc { 
        font-size: 0.85rem; 
    }
    
    /* 气泡优化 */
    .bubble { 
        font-size: 1.2rem; 
    }
    
    /* 特殊气泡优化 */
    .special-bubble {
        width: 50px !important;
        height: 50px !important;
        font-size: 1rem !important;
    }
    
    /* 调整特殊气泡位置避免重叠 */
    .special-bubble:nth-child(1) { left: 10% !important; top: 15% !important; }
    .special-bubble:nth-child(2) { left: 15% !important; top: 65% !important; }
    .special-bubble:nth-child(3) { left: 80% !important; top: 20% !important; }
    .special-bubble:nth-child(4) { left: 75% !important; top: 70% !important; }
    
    /* 彩蛋弹窗优化 */
    .easter-egg-popup h1 { font-size: 2rem !important; }
    .easter-egg-popup p { font-size: 1.2rem !important; }
    .easter-egg-popup button { font-size: 1rem !important; padding: 0.8rem 1.5rem !important; }
}

/* 小屏手机优化 */
@media (max-width: 480px) {
    .liquid-circle { 
        height: 250px; 
        width: 250px; 
    }
    .main-title { font-size: 1.8rem; }
    .main-description { font-size: 0.95rem; }
    .section-title { font-size: 1.6rem; }
    .feature-item { padding: var(--spacing-sm); }
    .special-bubble {
        width: 45px !important;
        height: 45px !important;
        font-size: 0.9rem !important;
    }
}

/* 触摸设备悬停状态优化 */
@media (hover: none) and (pointer: coarse) {
    .nav-link:hover, .liquid-circle:hover, .action-btn:hover, .feature-item:hover, .special-bubble:hover { transform: none; }
    .nav-link:active, .liquid-circle:active, .action-btn:active, .feature-item:active, .special-bubble:active { transform: scale(0.98); }
    .feature-item:active { background: rgba(255,255,255,0.8); }
    .action-btn:active { background: rgba(30,79,161,0.8); }
}

/* 移动端性能优化 */
@media (max-width: 768px) {
    .bubbles-background {
        display: none; /* 在移动端隐藏气泡背景以提高性能 */
    }
    
    .liquid-circle::before,
    .liquid-circle::after,
    .special-bubble::before {
        display: none; /* 在移动端隐藏复杂效果以提高性能 */
    }
}
</style>
</head>

<div class="bubbles-background" id="bubblesBackground"></div>

<script>
// 移动端菜单功能
const mobileMenuToggle = document.getElementById('mobileMenuToggle');
const navLinks = document.getElementById('navLinks');

mobileMenuToggle.addEventListener('click', function() {
    this.classList.toggle('active');
    navLinks.classList.toggle('active');
});

// 点击导航链接后关闭移动端菜单
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
        mobileMenuToggle.classList.remove('active');
        navLinks.classList.remove('active');
    });
});

let clickSequence=[],easterEggActive=!1,specialBubbles=[];
function initPage(){
    // 在移动端减少气泡数量以提高性能
    if (window.innerWidth > 768) {
        createBubbles();
    }
    createSpecialBubbles();
    setupHoverEffects();
    simulateProgress();
    setupScrollEffect();
}

function createBubbles(){
    const e=document.getElementById("bubblesBackground"),t=25,a=["0","3","4","5","6","7","8"];
    for(let t=0;t<25;t++){
        const n=document.createElement("div");
        n.classList.add("bubble","normal-bubble");
        const o=Math.floor(Math.random()*a.length);
        n.innerHTML='<div class="bubble-number">'+a[o]+"</div>";
        const i=Math.random()*100,l=Math.random()*100,r=40+40*Math.random(),c=["linear-gradient(135deg,rgba(30,79,161,.5) 0%,rgba(42,101,199,.3) 100%)","linear-gradient(135deg,rgba(134,134,139,.5) 0%,rgba(174,174,178,.3) 100%)","linear-gradient(135deg,rgba(81,81,84,.5) 0%,rgba(121,121,124,.3) 100%)","linear-gradient(135deg,rgba(245,124,0,.5) 0%,rgba(255,152,0,.3) 100%)","linear-gradient(135deg,rgba(30,136,229,.5) 0%,rgba(66,165,245,.3) 100%)"],d=c[Math.floor(Math.random()*c.length)];
        n.style.left=`${i}%`,n.style.top=`${l}%`,n.style.width=`${r}px`,n.style.height=`${r}px`,n.style.fontSize=`${r/2}px`,n.style.background=d,n.style.animationDelay=`${5*Math.random()}s`,e.appendChild(n)
    }
}

function createSpecialBubbles(){
    const e=document.getElementById("specialBubblesContainer");
    
    // 根据屏幕大小调整特殊气泡位置和大小
    const isMobile = window.innerWidth <= 768;
    const bubbleConfig = isMobile ? [
        {number:"1",size:50,color:"linear-gradient(135deg,rgba(30,79,161,.7) 0%,rgba(42,101,199,.5) 100%)",left:10,top:15},
        {number:"9",size:50,color:"linear-gradient(135deg,rgba(245,124,0,.7) 0%,rgba(255,112,67,.5) 100%)",left:15,top:65},
        {number:"2",size:50,color:"linear-gradient(135deg,rgba(198,40,40,.7) 0%,rgba(239,83,80,.5) 100%)",left:80,top:20},
        {number:"9",size:50,color:"linear-gradient(135deg,rgba(30,136,229,.7) 0%,rgba(100,181,246,.5) 100%)",left:75,top:70}
    ] : [
        {number:"1",size:60,color:"linear-gradient(135deg,rgba(30,79,161,.7) 0%,rgba(42,101,199,.5) 100%)",left:15,top:20},
        {number:"9",size:80,color:"linear-gradient(135deg,rgba(245,124,0,.7) 0%,rgba(255,112,67,.5) 100%)",left:20,top:70},
        {number:"2",size:70,color:"linear-gradient(135deg,rgba(198,40,40,.7) 0%,rgba(239,83,80,.5) 100%)",left:85,top:25},
        {number:"9",size:65,color:"linear-gradient(135deg,rgba(30,136,229,.7) 0%,rgba(100,181,246,.5) 100%)",left:80,top:75}
    ];
    
    specialBubbles=[];
    bubbleConfig.forEach((t,a)=>{
        const o=document.createElement("div");
        o.classList.add("special-bubble");
        o.innerHTML='<div class="bubble-number">'+t.number+"</div>";
        o.dataset.number=t.number;
        o.dataset.index=a;
        o.dataset.originalColor=t.color;
        o.style.left=`${t.left}%`;
        o.style.top=`${t.top}%`;
        o.style.width=`${t.size}px`;
        o.style.height=`${t.size}px`;
        o.style.fontSize=`${t.size/2}px`;
        o.style.background=t.color;
        o.addEventListener("click",function(){handleSpecialBubbleClick(this)});
        e.appendChild(o);
        specialBubbles.push(o);
    });
}

function handleSpecialBubbleClick(e){
    if(easterEggActive)return;
    const t=e.dataset.number,a=["1","9","2","9"],o=clickSequence.length;
    if(clickSequence.push(t),t===a[o]){
        e.classList.add("correct-sequence");
        setTimeout(()=>{
            e.classList.remove("correct-sequence");
            e.style.background=e.dataset.originalColor;
        },1e3);
        if(clickSequence.length===a.length){
            easterEggActive=!0;
            const t=document.createElement("div");
            t.innerHTML='<div class="easter-egg-popup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(30,79,161,0.6);z-index:3000;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;text-align:center;padding:20px;"><h1 style="font-size:4rem;margin-bottom:2rem;display:flex;align-items:center;gap:1rem;justify-content:center;"><img src="assets/images/CQUS.svg" style="width:45px;height:45px;"> 江汉思禹功，教化溯文翁</h1><p style="font-size:1.5rem;margin-bottom:3rem;">耐劳苦、尚俭朴、勤学业、爱国家</p><button id="closeEasterEgg" style="padding:1rem 2rem;font-size:1.2rem;background:rgba(255,255,255,0.2);border:2px solid white;border-radius:12px;color:white;cursor:pointer;">关闭彩蛋</button></div>';
            document.body.appendChild(t);
            document.getElementById("closeEasterEgg").addEventListener("click",()=>{
                t.remove();
                easterEggActive=!1;
                clickSequence=[];
                resetBubbles();
            });
        }
    }else{
        e.classList.add("wrong-sequence");
        setTimeout(()=>{
            e.classList.remove("wrong-sequence");
            e.style.background=e.dataset.originalColor;
        },1e3);
        clickSequence=[];
        resetBubbles();
    }
    e.style.animation="bounce 0.5s ease";
    setTimeout(()=>{
        e.style.animation="special-float 6s infinite ease-in-out";
    },500);
}

function resetBubbles(){
    specialBubbles.forEach(e=>{
        e.classList.remove("correct-sequence","wrong-sequence");
        e.style.background=e.dataset.originalColor;
    });
}

function setupHoverEffects(){
    // 在移动端禁用复杂的悬停效果
    if (window.innerWidth <= 768) return;
    
    const e=document.getElementById("liquidCircle"),t=document.getElementById("mainIcon");
    e.addEventListener("mousemove",e=>{
        const t=e.getBoundingClientRect(),a=t.left+t.width/2,o=t.top+t.height/2,i=(e.clientX-a)/(t.width/2),l=(e.clientY-o)/(t.height/2);
        e.style.transform=`scale(1.05) translate(${5*i}px, ${5*l}px)`;
        t.style.transform=`translate(${3*i}px, ${3*l}px) rotate(${5*i}deg)`;
    });
    e.addEventListener("mouseleave",()=>{
        e.style.transform="scale(1)";
        t.style.transform="translate(0, 0) rotate(0deg)";
    });
}

function simulateProgress(){
    const e=document.getElementById("progressBar"),t=document.getElementById("progressText");
    let a=65,o=!0;
    setInterval(()=>{
        o?(a+=.1,a>=67&&(o=!1)):(a-=.1,a<=65&&(o=!0));
        e.style.width=`${a}%`;
        t.textContent=`${Math.round(a)}%`;
    },100);
}

function setupScrollEffect(){
    window.addEventListener("scroll",()=>{
        document.getElementById("header").classList.toggle("scrolled",window.scrollY>50);
    });
}

// 窗口大小变化时重新初始化
window.addEventListener('resize', function() {
    // 移除现有特殊气泡
    const specialBubblesContainer = document.getElementById('specialBubblesContainer');
    specialBubblesContainer.innerHTML = '';
    specialBubbles = [];
    
    // 重新创建特殊气泡
    createSpecialBubbles();
    
    // 重新设置悬停效果
    setupHoverEffects();
});

document.addEventListener("DOMContentLoaded",initPage);
</script>
</body>
</html>
